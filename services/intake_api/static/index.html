<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AMAS Demonstrator</title>
  <style>
    body{font-family:system-ui,sans-serif;max-width:1100px;margin:2rem auto;padding:0 1rem;color:#17202a}
    textarea,input,button{font:inherit} textarea{width:100%;min-height:260px} input{padding:.55rem;width:100%}
    button{padding:.65rem 1rem;margin:.5rem .25rem .5rem 0;cursor:pointer} pre{white-space:pre-wrap;background:#f4f6f7;padding:1rem;border-radius:.5rem;overflow:auto}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.card{border:1px solid #d5d8dc;border-radius:.6rem;padding:1rem}
    @media(max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <h1>Assessment Moderation Agentic System</h1>
  <p>Submit a normalised JSON case, retrieve a report, and record a human review decision.</p>
  <div class="grid">
    <section class="card"><h2>Submit case</h2><label>API token<input id="token" type="password"></label><label>Case JSON<textarea id="payload">Paste samples/demo_case.json here</textarea></label><button onclick="submitCase()">Moderate</button></section>
    <section class="card"><h2>Retrieve report</h2><label>Case ID<input id="caseId"></label><button onclick="getReport()">Load report</button><h2>Human review</h2><label>Reviewer ID<input id="reviewer" value="demo-moderator"></label><label>Decision<input id="decision" value="approve"></label><button onclick="review()">Record review</button></section>
  </div>
  <h2>Response</h2><pre id="out">No request yet.</pre>
<script>
const out=document.getElementById('out');
function headers(){return {'Content-Type':'application/json','X-AMAS-API-Token':document.getElementById('token').value}}
async function show(r){const t=await r.text();try{out.textContent=JSON.stringify(JSON.parse(t),null,2)}catch{out.textContent=t}}
async function submitCase(){try{const p=JSON.parse(document.getElementById('payload').value);const r=await fetch('/v1/cases/json',{method:'POST',headers:headers(),body:JSON.stringify(p)});await show(r)}catch(e){out.textContent=String(e)}}
async function getReport(){const id=document.getElementById('caseId').value;await show(await fetch(`/v1/cases/${id}/report`,{headers:headers()}))}
async function review(){const text=out.textContent;let report={};try{report=JSON.parse(text)}catch{};const body={case_id:document.getElementById('caseId').value,report_id:report.report_id||report.id,reviewer_id:document.getElementById('reviewer').value,decision:document.getElementById('decision').value,comment:'Recorded in AMAS demonstrator',changes:{}};await show(await fetch('/v1/reviews',{method:'POST',headers:headers(),body:JSON.stringify(body)}))}
</script>
</body></html>
