name: amas

services:
  postgres:
    image: postgres:16.14-alpine
    container_name: amas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AMAS_APP_PASSWORD: ${AMAS_APP_PASSWORD}
      AMAS_READONLY_PASSWORD: ${AMAS_READONLY_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [amas]

  garage-config:
    image: alpine:3.22
    container_name: amas-garage-config
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /out
        sed \
          -e "s/__GARAGE_RPC_SECRET__/${GARAGE_RPC_SECRET}/g" \
          -e "s/__GARAGE_ADMIN_TOKEN__/${GARAGE_ADMIN_TOKEN}/g" \
          -e "s/__GARAGE_METRICS_TOKEN__/${GARAGE_METRICS_TOKEN}/g" \
          /in/garage.toml > /out/garage.toml
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN}
    volumes:
      - ./garage.toml:/in/garage.toml:ro
      - garage_config:/out
    networks: [amas]

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: amas-garage
    restart: unless-stopped
    depends_on:
      garage-config:
        condition: service_completed_successfully
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml
      GARAGE_DEFAULT_ACCESS_KEY: ${S3_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${S3_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: ${S3_BUCKET}
    volumes:
      - garage_config:/etc:ro
      - garage_data:/var/lib/garage
    ports:
      - "3900:3900"
      - "127.0.0.1:3903:3903"
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [amas]

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.26.7
    container_name: amas-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_PORT: ${N8N_PORT}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_RUNNERS_ENABLED: "true"
      N8N_PAYLOAD_SIZE_MAX: "32"
      N8N_FORMDATA_FILE_SIZE_MAX: "50"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      N8N_METRICS: "true"
      N8N_INTERNAL_BASE_URL: ${N8N_INTERNAL_BASE_URL}
      AMAS_INTAKE_INTERNAL_URL: ${AMAS_INTAKE_INTERNAL_URL}
      AMAS_API_TOKEN: ${AMAS_API_TOKEN}
      AMAS_INTERNAL_TOKEN: ${AMAS_INTERNAL_TOKEN}
      AMAS_EVAL_TOKEN: ${AMAS_EVAL_TOKEN}
      AMAS_WORKFLOW_VERSION: ${AMAS_WORKFLOW_VERSION}
      AMAS_CORPUS_VERSION: ${AMAS_CORPUS_VERSION}
      ANYTHINGLLM_BASE_URL: ${ANYTHINGLLM_BASE_URL}
      ANYTHINGLLM_API_KEY: ${ANYTHINGLLM_API_KEY}
      ANYTHINGLLM_WORKSPACE_SLUG: ${ANYTHINGLLM_WORKSPACE_SLUG}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_PRIMARY_MODEL: ${LLM_PRIMARY_MODEL}
      LLM_CRITIC_MODEL: ${LLM_CRITIC_MODEL}
      LLM_PROVIDER_NAME: ${LLM_PROVIDER_NAME}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../workflows:/opt/amas/workflows:ro
    networks: [amas]

  intake-api:
    build: ../services/intake_api
    container_name: amas-intake-api
    restart: unless-stopped
    depends_on:
      garage:
        condition: service_healthy
      n8n:
        condition: service_started
    environment:
      AMAS_API_TOKEN: ${AMAS_API_TOKEN}
      AMAS_INTERNAL_TOKEN: ${AMAS_INTERNAL_TOKEN}
      AMAS_MAX_FILE_BYTES: ${AMAS_MAX_FILE_BYTES}
      N8N_INTERNAL_BASE_URL: ${N8N_INTERNAL_BASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    ports:
      - "8080:8080"
    networks: [amas]

  bootstrap:
    build: ../services/intake_api
    container_name: amas-bootstrap
    profiles: [tools]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AMAS_DATABASE_URL: ${AMAS_DATABASE_URL}
    entrypoint: ["python", "/workspace/scripts/load_prompts.py"]
    volumes:
      - ..:/workspace:ro
    networks: [amas]

networks:
  amas:
    name: amas-network

volumes:
  postgres_data:
  n8n_data:
  garage_data:
  garage_config:
